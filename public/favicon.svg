<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- MeasureX favicon: ruler icon with MX brand color -->
  <rect width="64" height="64" rx="12" fill="#0a0a1a"/>
  <!-- Ruler body -->
  <rect x="8" y="24" width="48" height="16" rx="3" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Tick marks -->
  <line x1="16" y1="24" x2="16" y2="32" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="24" y2="28" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="24" x2="32" y2="32" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="40" y2="28" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="24" x2="48" y2="32" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- MX text -->
  <text x="32" y="21" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="800" fill="#00d4ff" letter-spacing="1">MX</text>
</svg>
